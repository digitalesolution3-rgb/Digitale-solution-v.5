function buildESCPOSTicket(shopName, shopPhone, items, total, invoiceNum) {

  const [lines, setLines] = useState([]); const [montant, setMontant] = useState(""); const [label, setLabel] = useState(""); const [modeMonnaie, setModeMonnaie] = useState(false); const [recu, setRecu] = useState("");
  const montantNum = parseInt(montant) || 0; const totalLines = lines.reduce((s,l)=>s + l.montant, 0); const recuNum = parseInt(recu) || 0; const monnaie = recuNum - totalLines; const BILLS = [500, 1000, 2000, 5000, 10000, 25000];
  const ajouterLigne = () => { if(!montantNum || montantNum < 1) { flashMsg("Entrez un montant"); return; } const nom = label.trim() || `Vente ${fmtPrice(montantNum)}`; setLines([...lines, { id: Date.now()+Math.random(), label: nom, montant: montantNum }]); setMontant(""); setLabel(""); };
  const supprimerLigne = (id) => setLines(lines.filter(l=>l.id!==id)); const reset = () => { setLines([]); setMontant(""); setLabel(""); setModeMonnaie(false); setRecu(""); };
  const valider = (print) => { if(lines.length === 0) { flashMsg("Ajoutez des lignes"); return; } const items = lines.map(l => ({ label: l.label, amount: l.montant, qty: 1 })); addSale(items, totalLines, print); reset(); };
  const pushDigit = (d) => { if(modeMonnaie) setRecu(p => p.length >= 8 ? p : p + d); else setMontant(p => p.length >= 8 ? p : p + d); }; const del = () => { if(modeMonnaie) setRecu(p => p.slice(0,-1)); else setMontant(p => p.slice(0,-1)); };
  return ( <div style={{height:"100%", display:"flex", flexDirection:"column"}}><div style={{flex:1, overflowY:"auto", padding:12}}><div style={{background:T.surface, borderRadius:16, padding:16, marginBottom:12, border:`2px solid ${modeMonnaie ? T.blue : (montantNum>0 ? T.accent : T.border)}`}}>{!modeMonnaie && <input placeholder="Libellé (optionnel)" value={label} onChange={e=>setLabel(e.target.value)} style={{width:"100%", background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:10, padding:10, marginBottom:10, color:T.text}} />}<div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline"}}><span style={{fontSize:11, color:T.textMute}}>{modeMonnaie ? "Montant reçu" : "Montant"}</span><span style={{fontSize:36, fontWeight:800, color:modeMonnaie ? T.blue : (montantNum>0 ? T.accent : T.textMute)}}>{modeMonnaie ? (recu ? fmtPrice(recuNum) : "—") : (montant ? fmtPrice(montantNum) : "0 F")}</span></div></div>{modeMonnaie && (<div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12}}>{BILLS.map(b=><button key={b} onClick={()=>setRecu(String(b))} style={{background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:12, fontWeight:700}}>{b>=1000?(b/1000)+"k":b}</button>)}</div>)}{lines.length > 0 && (<div style={{marginBottom:12}}><div style={{fontSize:10, color:T.textMute, marginBottom:6}}>Lignes ({lines.length})</div>{lines.map((l,idx)=>(<div key={l.id} style={{background:T.surface2, borderRadius:10, padding:10, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center"}}><div><span style={{color:T.textMute, marginRight:8}}>{idx+1}.</span><span>{l.label}</span></div><div style={{display:"flex", alignItems:"center", gap:10}}><span style={{fontWeight:700, color:T.accent}}>{fmtPrice(l.montant)}</span>{!modeMonnaie && <button onClick={()=>supprimerLigne(l.id)} style={{background:T.btnRed.bg, border:"none", borderRadius:6, width:28, height:28, color:T.red, fontSize:16}}>×</button>}</div></div>))}<div style={{background:T.btnGreen.bg, borderRadius:12, padding:12, marginTop:6, display:"flex", justifyContent:"space-between", border:`1px solid ${T.green}`}}><span style={{fontWeight:700}}>TOTAL</span><span style={{fontSize:20, fontWeight:800, color:T.green}}>{fmtPrice(totalLines)}</span></div></div>)}{modeMonnaie && recuNum > 0 && (<div style={{background:monnaie>=0 ? T.btnGreen.bg : T.btnRed.bg, borderRadius:12, padding:16, textAlign:"center", marginBottom:12}}><div style={{fontSize:11, color:T.textMute}}>Monnaie à rendre</div><div style={{fontSize:32, fontWeight:800, color:monnaie>=0 ? T.green : T.red}}>{monnaie>=0 ? fmtPrice(monnaie) : `-${fmtPrice(Math.abs(monnaie))}`}</div></div>)}</div><div style={{padding:12, borderTop:`1px solid ${T.border}`, background:T.bg}}><div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6}}>{[7,8,9,4,5,6,1,2,3].map(d=><button key={d} onClick={()=>pushDigit(String(d))} style={{background:T.surface2, border:`1px solid ${T.border}`, borderRadius:12, height:60, fontSize:24, fontWeight:600, color:T.text}}>{d}</button>)}<button onClick={()=>pushDigit("00")} style={{background:T.surface2, border:`1px solid ${T.border}`, borderRadius:12, height:60, fontSize:18}}>00</button><button onClick={()=>pushDigit("0")} style={{background:T.surface2, border:`1px solid ${T.border}`, borderRadius:12, height:60, fontSize:24}}>0</button><button onClick={del} style={{background:T.btnRed.bg, border:`1px solid ${T.btnRed.border}`, borderRadius:12, height:60, fontSize:20, color:T.red}}>⌫</button></div>{!modeMonnaie ? (<div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:10}}><button onClick={reset} style={{background:"transparent", border:`1px solid ${T.btnRed.border}`, borderRadius:12, padding:12, color:T.red, fontWeight:600}}>✕ Annuler</button><button onClick={ajouterLigne} style={{background:T.btnBlue.bg, border:`1px solid ${T.btnBlue.border}`, borderRadius:12, padding:12, color:T.blue, fontWeight:700}}>➕ Ajouter ligne</button><button onClick={()=>{ if(lines.length) setModeMonnaie(true); else flashMsg("Ajoutez des lignes d'abord"); }} style={{background:T.surface2, border:`1px solid ${T.border}`, borderRadius:12, padding:12, fontWeight:600}}>💵 Monnaie</button><button onClick={()=>valider(true)} style={{background:T.btnGreen.bg, border:`2px solid ${T.green}`, borderRadius:12, padding:12, color:T.green, fontWeight:800}}>🖨️ Valider</button></div>) : (<div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:10}}><button onClick={()=>{ setModeMonnaie(false); setRecu(""); }} style={{background:T.surface2, border:`1px solid ${T.border}`, borderRadius:12, padding:12}}>← Retour</button><button onClick={()=>valider(false)} style={{background:T.btnBlue.bg, border:`1px solid ${T.btnBlue.border}`, borderRadius:12, padding:12, color:T.blue, fontWeight:600}}>✅ Sans ticket</button><button onClick={()=>valider(true)} style={{background:T.btnGreen.bg, border:`2px solid ${T.green}`, borderRadius:12, padding:12, color:T.green, fontWeight:800}}>🖨️ Imprimer</button></div>)}</div></div> );
}

// ══════════════════════════════════════════════════════════════════
//  APP AUTH
// ══════════════════════════════════════════════════════════════════
function App() {
  const [themeName, setThemeName] = useState(()=>localStorage.getItem("pos_theme")||"dark"); const T = THEMES[themeName];
  const [session, setSession] = useState(null); const [authMode, setAuthMode] = useState("login"); const [authShopName, setAuthShopName] = useState(""); const [authOwnerName, setAuthOwnerName] = useState(""); const [authWhatsapp, setAuthWhatsapp] = useState(""); const [authPhone, setAuthPhone] = useState(""); const [authPassword, setAuthPassword] = useState(""); const [authConfirm, setAuthConfirm] = useState(""); const [authError, setAuthError] = useState(""); const [authLoading, setAuthLoading] = useState(false); const [flash, setFlash] = useState(null); const [devMode, setDevMode] = useState(false); const [devPin, setDevPin] = useState(""); const [devPinError, setDevPinError] = useState(false); const [devPinShake, setDevPinShake] = useState(false); const clickCountRef = useRef({ count: 0, timer: null });
  const flashMsg = (msg) => { setFlash(msg); setTimeout(()=>setFlash(null),2500); };
  useEffect(()=>{ document.body.style.background = T.bg; localStorage.setItem("pos_theme", themeName); }, [themeName]);
  const handleLogoTripleClick = () => { const ref = clickCountRef.current; ref.count++; clearTimeout(ref.timer); if (ref.count >= 3) { ref.count = 0; setDevMode(true); setDevPin(""); setDevPinError(false); } ref.timer = setTimeout(() => { ref.count = 0; }, 500); };
  const verifyDevPin = () => { if (devPin === DEV_PIN) { setDevMode(false); setDevPin(""); setSession({ shopId: "dev_dashboard", shopName: "Développeur", ownerName: "Admin", isDev: true }); } else { setDevPinError(true); setDevPinShake(true); setTimeout(() => { setDevPinShake(false); setDevPin(""); setDevPinError(false); }, 700); } };
  const handleRegister = async () => { if(!authShopName.trim() || !authOwnerName.trim() || !authWhatsapp.trim() || authPassword.length<4 || authPassword!==authConfirm) { setAuthError("Vérifiez les champs"); return; } setAuthLoading(true); try { const existing = await db.collection("shops").where("shopName", "==", authShopName.trim()).get(); if(!existing.empty) throw new Error("Nom déjà utilisé"); const shopId = "shop_"+Date.now()+"_"+Math.random().toString(36).slice(2,6); const now = Date.now(); await db.collection("shops").doc(shopId).set({ shopName: authShopName.trim(), ownerName: authOwnerName.trim(), whatsapp: authWhatsapp.trim(), phone: authPhone.trim(), password: btoa(authPassword), createdAt: now, active: true, plan: "mensuel", subscriptionStart: now, subscriptionEnd: calculateEndDate(now, "mensuel"), adminPin: btoa("0000") }); await db.collection("shops").doc(shopId).collection("products").doc("_init").set({init:true}); await db.collection("shops").doc(shopId).collection("sales").doc("_init").set({init:true}); await db.collection("shops").doc(shopId).collection("stock_movements").doc("_init").set({init:true}); await db.collection("shops").doc(shopId).collection("expenses").doc("_init").set({init:true}); flashMsg("Commerce créé ! Connectez-vous"); setAuthMode("login"); } catch(e) { setAuthError(e.message); } setAuthLoading(false); };
  const handleLogin = async () => { if(!authShopName.trim() || !authPassword) { setAuthError("Nom et mot de passe requis"); return; } setAuthLoading(true); try { const query = await db.collection("shops").where("shopName", "==", authShopName.trim()).get(); if(query.empty) throw new Error("Commerce introuvable"); const doc = query.docs[0]; const data = doc.data(); if(btoa(authPassword) !== data.password) throw new Error("Mot de passe incorrect"); if(data.active === false) throw new Error("Compte désactivé"); setSession({ shopId: doc.id, shopName: data.shopName, shopPhone: data.phone || "", whatsapp: data.whatsapp, ownerName: data.ownerName, plan: data.plan || "mensuel", subscriptionEnd: data.subscriptionEnd, adminPin: data.adminPin || btoa("0000"), isDev: false }); } catch(e) { setAuthError(e.message); } setAuthLoading(false); };
  const logout = () => setSession(null);
  if (devMode) { return ( <div style={{minHeight:"100dvh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:20}}><div style={{maxWidth:400, width:"100%", background:T.surface, borderRadius:32, padding:32, textAlign:"center", border:`1px solid ${T.border}`}}><div style={{fontSize:48, marginBottom:16}}>🔧</div><div style={{fontFamily:"'Outfit'", fontSize:20, fontWeight:800, color:T.purple, marginBottom:8}}>Accès Développeur</div><div style={{display:"flex", gap:12, justifyContent:"center", marginBottom:24, animation: devPinShake ? "shake 0.35s ease" : "none"}}>{Array(6).fill(0).map((_,i)=><div key={i} style={{width:16,height:16,borderRadius:"50%", background: i < devPin.length ? (devPinError ? T.red : T.accent) : T.border}} />)}</div>{devPinError && <div style={{fontSize:12, color:T.red, marginBottom:16}}>✗ Code incorrect</div>}<div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10}}>{[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(<button key={i} onClick={()=>{ if(d==="⌫") setDevPin(p=>p.slice(0,-1)); else if(d!=="") setDevPin(p=>p.length<6 ? p+d : p); }} style={{background:d===""?"transparent":T.surface2, border:`1px solid ${T.border}`, borderRadius:12, height:60, fontSize:22, color:d==="⌫"?T.red:T.text}}>{d}</button>))}</div><button onClick={verifyDevPin} style={{marginTop:20, background:T.accent, border:"none", borderRadius:12, padding:12, width:"100%", fontWeight:700, color:T.bg}}>Valider</button><button onClick={()=>{setDevMode(false); setDevPin("");}} style={{marginTop:12, background:"transparent", border:"none", color:T.textMute, fontSize:12}}>← Retour</button></div></div> ); }
  if(!session) { return ( <div style={{minHeight:"100dvh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:20}}><div style={{maxWidth:420, width:"100%", background:T.surface, borderRadius:32, padding:24, border:`1px solid ${T.border}`}}><div style={{textAlign:"center", marginBottom:24, cursor:"pointer"}} onClick={handleLogoTripleClick}><div style={{fontSize:42}}>🏪</div><div style={{fontFamily:"'Outfit'", fontSize:28, fontWeight:800, color:T.accent}}>Caisse SaaS Pro</div><div style={{fontSize:10, color:T.textMute, marginTop:4}}>Triple-clic mode développeur</div></div>{flash && <div style={{background:T.btnRed.bg, color:T.red, padding:8, borderRadius:8, marginBottom:12, textAlign:"center"}}>{flash}</div>}<div style={{display:"flex", gap:8, marginBottom:20, background:T.surface2, borderRadius:12, padding:4}}><button onClick={()=>{setAuthMode("login"); setAuthError("");}} style={{flex:1, background:authMode==="login"?T.accent:"transparent", border:"none", borderRadius:8, padding:"8px", fontWeight:700, color:authMode==="login"?T.bg:T.textSub}}>Connexion</button><button onClick={()=>{setAuthMode("register"); setAuthError("");}} style={{flex:1, background:authMode==="register"?T.accent:"transparent", border:"none", borderRadius:8, padding:"8px", fontWeight:700, color:authMode==="register"?T.bg:T.textSub}}>Créer</button></div><div style={{display:"flex", flexDirection:"column", gap:12}}><input placeholder="Nom du commerce" value={authShopName} onChange={e=>setAuthShopName(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} />{authMode==="register" && (<><input placeholder="Nom du propriétaire" value={authOwnerName} onChange={e=>setAuthOwnerName(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} /><input placeholder="WhatsApp" value={authWhatsapp} onChange={e=>setAuthWhatsapp(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} /><input placeholder="Téléphone" value={authPhone} onChange={e=>setAuthPhone(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} /></>)}<input type="password" placeholder="Mot de passe" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} />{authMode==="register" && <input type="password" placeholder="Confirmer" value={authConfirm} onChange={e=>setAuthConfirm(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:14, padding:"14px", color:T.text}} />}{authError && <div style={{fontSize:12, color:T.red, textAlign:"center"}}>{authError}</div>}<button onClick={authMode==="register"?handleRegister:handleLogin} disabled={authLoading} style={{background:T.accent, border:"none", borderRadius:16, padding:"16px", fontWeight:800, fontSize:16, color:T.bg}}>{authLoading ? "..." : (authMode==="register" ? "Créer" : "Se connecter")}</button></div></div></div> ); }
  if(session.isDev) return <DevDashboard T={T} themeName={themeName} setThemeName={setThemeName} logout={logout} flashMsg={flashMsg} />;
  return <MainApp session={session} T={T} themeName={themeName} setThemeName={setThemeName} logout={logout} flashMsg={flashMsg} />;
}

// ══════════════════════════════════════════════════════════════════
//  MAIN APP AVEC BANDE D'ABONNEMENT + DÉPENSES
// ══════════════════════════════════════════════════════════════════
function MainApp({ session, T, themeName, setThemeName, logout, flashMsg }) {
  const [products, setProducts] = useState(() => OfflineStore.get(session.shopId, "products") || []);
  const [sales, setSales] = useState(() => OfflineStore.get(session.shopId, "sales") || []);
  const [stockMovements, setStockMovements] = useState(() => OfflineStore.get(session.shopId, "stock_movements") || []);
  const [expenses, setExpenses] = useState(() => OfflineStore.get(session.shopId, "expenses") || []);
  const [mode, setMode] = useState("CAISSE");
  const [items, setItems] = useState([]);
  const [ownerMode, setOwnerMode] = useState(false);
  const [pinModal, setPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [pinShake, setPinShake] = useState(false);
  const [useBLE, setUseBLE] = useState(true);

  useEffect(() => { const unsub = syncShopData(session.shopId, setProducts, setSales, setStockMovements, setExpenses); return unsub; }, [session.shopId]);

  const total = items.reduce((s,i)=>s + (i.amount || 0) * (i.qty || 1), 0);
  
  const updateStock = async (productId, quantity, type, reason) => {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    if (product.stock === null || product.stock === undefined || product.stock === -1) return;
    const newStock = Math.max(0, (product.stock || 0) + quantity);
    const updatedProducts = products.map(p => p.id === productId ? { ...p, stock: newStock } : p);
    setProducts(updatedProducts);
    OfflineStore.set(session.shopId, "products", updatedProducts);
    const movement = { id: Date.now().toString(36)+Math.random().toString(36).slice(2), productId, productName: product.name, quantity, type, reason, timestamp: Date.now() };
    setStockMovements([movement, ...stockMovements]);
    OfflineStore.set(session.shopId, "stock_movements", [movement, ...stockMovements]);
    if(db) { await db.collection("shops").doc(session.shopId).collection("products").doc(productId).update({ stock: newStock }); await db.collection("shops").doc(session.shopId).collection("stock_movements").doc(movement.id).set(movement); }
  };

  const addSale = async (saleItems, saleTotal, print=true) => {
    for (const item of saleItems) { const product = products.find(p => p.id === item.productId); if (product && product.stock !== null && product.stock !== undefined && product.stock !== -1) { await updateStock(item.productId, - (item.qty || 1), "sortie", `Vente #${Date.now()}`); } }
    const newSale = { id: Date.now().toString(36)+Math.random().toString(36).slice(2), date: new Date().toISOString().slice(0,10), timestamp: Date.now(), items: saleItems, total: saleTotal, invoiceNum: Date.now(), cancelled: false };
    setSales([...sales, newSale]); OfflineStore.set(session.shopId, "sales", [...sales, newSale]);
    if(db) db.collection("shops").doc(session.shopId).collection("sales").doc(newSale.id).set(newSale).catch(()=>{});
    if(print) { try { if (useBLE && printer.connected) { await printViaBLE(session.shopName, session.shopPhone, saleItems, saleTotal, newSale.invoiceNum); flashMsg("✅ Vente + impression BLE"); } else { printFallback(session.shopName, session.shopPhone, saleItems, saleTotal, newSale.invoiceNum); flashMsg("✅ Vente + impression navigateur"); } } catch(e) { printFallback(session.shopName, session.shopPhone, saleItems, saleTotal, newSale.invoiceNum); flashMsg("✅ Vente (fallback)"); } } else { flashMsg("✅ Vente enregistrée"); }
    setItems([]);
  };

  const addExpense = async (expense) => {
    const newExpense = { ...expense, id: Date.now().toString(36)+Math.random().toString(36).slice(2), timestamp: Date.now() };
    setExpenses([newExpense, ...expenses]); OfflineStore.set(session.shopId, "expenses", [newExpense, ...expenses]);
    if(db) db.collection("shops").doc(session.shopId).collection("expenses").doc(newExpense.id).set(newExpense);
    flashMsg(`Dépense enregistrée: ${expense.label} - ${fmtPrice(expense.amount)}`);
  };

  const cancelSale = (saleId, raison) => {
    const sale = sales.find(s => s.id === saleId);
    if (sale && !sale.cancelled) { for (const item of sale.items) { if (item.productId) updateStock(item.productId, item.qty || 1, "entree", `Annulation vente #${sale.invoiceNum}`); } }
    const updated = sales.map(s => s.id===saleId ? {...s, cancelled:true, cancelRaison:raison, cancelledAt:Date.now()} : s);
    setSales(updated); OfflineStore.set(session.shopId, "sales", updated);
    if(db) db.collection("shops").doc(session.shopId).collection("sales").doc(saleId).update({cancelled:true, cancelRaison:raison, cancelledAt:Date.now()}).catch(()=>{});
    flashMsg(`🗑️ Vente annulée : ${raison}`);
  };

  const verifyAdminPin = () => { const expectedPin = atob(session.adminPin || btoa("0000")); if (pinInput === expectedPin) { setPinModal(false); setPinInput(""); setOwnerMode(true); } else { setPinError(true); setPinShake(true); setTimeout(() => { setPinShake(false); setPinInput(""); setPinError(false); }, 700); } };
  const enterOwnerMode = () => { setPinModal(true); setPinInput(""); setPinError(false); };
  const exitOwnerMode = () => { setOwnerMode(false); };
  const updateAdminPin = async (newPin) => { const newEncoded = btoa(newPin); await db.collection("shops").doc(session.shopId).update({ adminPin: newEncoded }); session.adminPin = newEncoded; flashMsg("PIN administrateur modifié"); };

  return (
    <div style={{height:"100dvh", background:T.bg, display:"flex", flexDirection:"column"}}>
      <SubscriptionBanner T={T} shopId={session.shopId} />
      {pinModal && (<div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000}}><div style={{background:T.surface, borderRadius:32, padding:24, width:"90%", maxWidth:360, textAlign:"center"}}><div style={{fontSize:48, marginBottom:12}}>👑</div><div style={{fontSize:18, fontWeight:800, marginBottom:8}}>Accès Administrateur</div><div style={{fontSize:12, color:T.textMute, marginBottom:20}}>Entrez votre code PIN à 4 chiffres</div><div style={{display:"flex", gap:12, justifyContent:"center", marginBottom:20, animation: pinShake ? "shake 0.35s ease" : "none"}}>{Array(4).fill(0).map((_,i)=><div key={i} style={{width:16,height:16,borderRadius:"50%", background: i < pinInput.length ? (pinError ? T.red : T.accent) : T.border}} />)}</div>{pinError && <div style={{fontSize:12, color:T.red, marginBottom:16}}>✗ Code incorrect</div>}<div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8}}>{[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(<button key={i} onClick={()=>{ if(d==="⌫") setPinInput(p=>p.slice(0,-1)); else if(d!=="") setPinInput(p=>p.length<4 ? p+d : p); }} style={{background:d===""?"transparent":T.surface2, border:`1px solid ${T.border}`, borderRadius:12, height:55, fontSize:22, color:d==="⌫"?T.red:T.text}}>{d}</button>))}</div><button onClick={verifyAdminPin} style={{marginTop:16, background:T.accent, border:"none", borderRadius:12, padding:12, width:"100%", fontWeight:700, color:T.bg}}>Valider</button><button onClick={()=>{setPinModal(false); setPinInput("");}} style={{marginTop:8, background:"transparent", border:"none", color:T.textMute}}>Annuler</button></div></div>)}
      <div style={{background:T.header, padding:"8px 12px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0}}><div><div style={{fontSize:10, color:T.textMute}}>{session.shopName}</div><div style={{fontFamily:"'Outfit'", fontWeight:800, color:T.accent}}>Caisse Pro</div></div><div style={{display:"flex", gap:8}}><div style={{display:"flex", gap:4, background:T.surface2, borderRadius:20, padding:4}}>{Object.values(THEMES).map(t=><button key={t.id} onClick={()=>setThemeName(t.id)} style={{background:themeName===t.id?T.accent:"transparent", border:"none", borderRadius:16, width:28, height:28}}>{t.label}</button>)}</div><button onClick={()=>setMode("CAISSE")} style={{background:mode==="CAISSE"?T.accent:"transparent", border:"none", borderRadius:8, padding:"6px 12px", fontWeight:700, color:mode==="CAISSE"?T.bg:T.textSub}}>🛒 Caisse</button>{!ownerMode ? (<button onClick={enterOwnerMode} style={{background:T.btnBlue.bg, border:"none", borderRadius:8, padding:"6px 12px", fontWeight:700, color:T.blue}}>👑 Admin</button>) : (<button onClick={exitOwnerMode} style={{background:T.btnRed.bg, border:"none", borderRadius:8, padding:"6px 12px", fontWeight:700, color:T.red}}>🔒 Quitter Admin</button>)}<button onClick={logout} style={{background:"transparent", border:`1px solid ${T.border}`, borderRadius:8, padding:"4px 8px", fontSize:11}}>Déco</button></div></div>
      {mode === "CAISSE" && (<div className="desktop-grid" style={{flex:1, overflow:"hidden"}}><div className="desktop-main" style={{flex:1, overflowY:"auto", padding:12}}><BLEStatus T={T} /><div style={{display:"flex", gap:6, marginBottom:12}}><button onClick={()=>setUseBLE(true)} style={{flex:1, background:useBLE?T.accent:T.surface, borderRadius:12, padding:6, fontSize:11, fontWeight:600, color:useBLE?T.bg:T.text}}>🖨️ BLE 80mm</button><button onClick={()=>setUseBLE(false)} style={{flex:1, background:!useBLE?T.accent:T.surface, borderRadius:12, padding:6, fontSize:11, fontWeight:600, color:!useBLE?T.bg:T.text}}>🖥️ Navigateur</button></div><CaisseContent T={T} products={products} addSale={addSale} items={items} setItems={setItems} total={total} flashMsg={flashMsg} sales={sales} cancelSale={cancelSale} /></div><div className="desktop-sidebar" style={{width:340, background:T.surface, borderLeft:`1px solid ${T.border}`, display:"flex", flexDirection:"column"}}><PanierContent T={T} items={items} setItems={setItems} total={total} addSale={addSale} flashMsg={flashMsg} useBLE={useBLE} /></div></div>)}
      {ownerMode && (<OwnerContent T={T} shopName={session.shopName} whatsapp={session.whatsapp} products={products} setProducts={setProducts} sales={sales} flashMsg={flashMsg} shopId={session.shopId} stockMovements={stockMovements} updateStock={updateStock} updateAdminPin={updateAdminPin} expenses={expenses} addExpense={addExpense} />)}
    </div>
  );
}

function CaisseContent({ T, products, addSale, items, setItems, total, flashMsg, sales, cancelSale }) {
  const [view, setView] = useState("catalog"); const [search, setSearch] = useState(""); const [manualLabel, setManualLabel] = useState(""); const [manualAmount, setManualAmount] = useState(""); const [cancelModal, setCancelModal] = useState(null); const [cancelRaison, setCancelRaison] = useState("");
  const filtered = (products || []).filter(p => p && p.active !== false && p.name && p.name.toLowerCase().includes(search.toLowerCase()));
  const todaySales = (sales || []).filter(s => s.date === new Date().toISOString().slice(0,10) && !s.cancelled);
  const addProduct = (p) => { if (p.stock !== undefined && p.stock !== null && p.stock !== -1 && p.stock <= 0) { flashMsg(`⚠️ ${p.name} en rupture`); return; } const exist = items.find(i=>i.productId===p.id); if(exist) setItems(items.map(i=>i.productId===p.id?{...i, qty:(i.qty||1)+1}:i)); else setItems([...items, {id:Date.now()+Math.random(), productId:p.id, label:p.name, amount:p.price, qty:1}]); };
  const addManual = () => { if(!manualLabel.trim() || !manualAmount) { flashMsg("Nom et montant requis"); return; } setItems([...items, {id:Date.now()+Math.random(), label:manualLabel.trim(), amount:parseInt(manualAmount), qty:1}]); setManualLabel(""); setManualAmount(""); };
  return (<><div style={{display:"flex", gap:6, marginBottom:12}}><button onClick={()=>setView("catalog")} style={{flex:1, background:view==="catalog"?T.accent:T.surface, borderRadius:12, padding:8, fontWeight:600, color:view==="catalog"?T.bg:T.text}}>📦 Catalogue</button><button onClick={()=>setView("manual")} style={{flex:1, background:view==="manual"?T.accent:T.surface, borderRadius:12, padding:8, fontWeight:600, color:view==="manual"?T.bg:T.text}}>✏️ Manuel</button><button onClick={()=>setView("rapide")} style={{flex:1, background:view==="rapide"?T.accent:T.surface, borderRadius:12, padding:8, fontWeight:600, color:view==="rapide"?T.bg:T.text}}>⚡ Rapide</button><button onClick={()=>setView("annulations")} style={{flex:1, background:view==="annulations"?T.red:T.surface, borderRadius:12, padding:8, fontWeight:600, color:view==="annulations"?T.bg:T.text}}>🗑️ Annul.</button></div>{view === "catalog" && (<><input placeholder="🔍 Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%", background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:10, marginBottom:12, color:T.text}} /><div className="product-grid" style={{display:"grid", gap:8}}>{filtered.map(p => (<button key={p.id} onClick={()=>addProduct(p)} style={{background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:10, textAlign:"left"}}><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:11, color:T.accent}}>{fmtPrice(p.price)}</div>{p.stock !== undefined && p.stock !== null && p.stock !== -1 && <div style={{fontSize:9, color:p.stock<=5?T.red:T.textMute}}>Stock: {p.stock}</div>}{p.stock === -1 && <div style={{fontSize:9, color:T.textMute}}>♾️ Illimité</div>}</button>))}</div></>)}{view === "manual" && (<div style={{background:T.surface, borderRadius:16, padding:16}}><input placeholder="Nom article" value={manualLabel} onChange={e=>setManualLabel(e.target.value)} style={{width:"100%", background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:10, marginBottom:8, color:T.text}} /><input placeholder="Montant (F)" value={manualAmount} onChange={e=>setManualAmount(e.target.value.replace(/\D/g,""))} style={{width:"100%", background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:10, marginBottom:12, color:T.text}} /><button onClick={addManual} style={{background:T.accent, border:"none", borderRadius:12, padding:12, fontWeight:700, width:"100%", color:T.bg}}>➕ Ajouter</button></div>)}{view === "rapide" && <VenteRapide T={T} addSale={addSale} flashMsg={flashMsg} />}{view === "annulations" && (<div>{todaySales.length===0 ? <div style={{textAlign:"center", padding:40, color:T.textMute}}>Aucune vente aujourd'hui</div> : todaySales.map(s=>(<div key={s.id} style={{background:T.surface, borderRadius:12, padding:12, marginBottom:8}}><div style={{display:"flex", justifyContent:"space-between"}}><span>{new Date(s.timestamp).toLocaleTimeString()}</span><span>{fmtPrice(s.total)}</span></div><button onClick={()=>setCancelModal(s)} style={{marginTop:8, background:T.btnRed.bg, border:"none", borderRadius:8, padding:"6px", width:"100%", color:T.red}}>🗑️ Annuler</button></div>))}</div>)}{cancelModal && (<div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000}}><div style={{background:T.surface, borderRadius:24, padding:20, width:"90%", maxWidth:360}}><div style={{fontSize:18, fontWeight:800, color:T.red}}>Annuler la vente</div><textarea placeholder="Motif de l'annulation (obligatoire)" value={cancelRaison} onChange={e=>setCancelRaison(e.target.value)} rows="3" style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, margin:"12px 0", color:T.text}} /><div style={{display:"flex", gap:8}}><button onClick={()=>{setCancelModal(null); setCancelRaison("");}} style={{flex:1, background:T.surface2, borderRadius:12, padding:12}}>Retour</button><button onClick={()=>{ if(cancelRaison.trim()){ cancelSale(cancelModal.id, cancelRaison); setCancelModal(null); setCancelRaison(""); } else flashMsg("Motif requis"); }} style={{flex:1, background:T.red, borderRadius:12, padding:12, color:"white"}}>Confirmer</button></div></div></div>)}</>);
}

function PanierContent({ T, items, setItems, total, addSale, flashMsg, useBLE }) {
  const updateQty = (id, delta) => setItems(items.map(i=>i.id===id?{...i, qty:Math.max(1,(i.qty||1)+delta)}:i));
  const removeItem = (id) => setItems(items.filter(i=>i.id!==id));
  const clearCart = () => { if(confirm("Annuler toute la vente ?")) setItems([]); };
  const cartTotal = items.reduce((s,i)=>s+(i.qty||1),0);
  return (<><div style={{padding:12, borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between"}}><span>🛒 Panier ({cartTotal})</span><button onClick={clearCart} style={{background:"transparent", border:"none", color:T.red}}>Tout annuler</button></div><div style={{flex:1, overflowY:"auto", padding:8}}>{items.map(it=>(<div key={it.id} style={{background:T.surface2, borderRadius:10, padding:8, marginBottom:6}}><div style={{display:"flex", justifyContent:"space-between"}}><span>{it.label}</span><span>{fmtPrice(it.amount*it.qty)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:4}}><div><button onClick={()=>updateQty(it.id,-1)} style={{background:T.bg, border:"none", width:26, borderRadius:5}}>-</button> {it.qty} <button onClick={()=>updateQty(it.id,1)} style={{background:T.bg, border:"none", width:26, borderRadius:5}}>+</button></div><button onClick={()=>removeItem(it.id)} style={{background:"transparent", border:"none", color:T.red}}>🗑️</button></div></div>))}</div><div style={{padding:12, borderTop:`1px solid ${T.border}`}}><div style={{display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:18, fontWeight:800}}><span>TOTAL</span><span>{fmtPrice(total)}</span></div><button onClick={()=>{ if(items.length) addSale(items, total, true); else flashMsg("Panier vide"); }} style={{width:"100%", background:T.green, border:"none", borderRadius:12, padding:12, fontWeight:700, color:T.bg}}>{useBLE ? "🖨️ BLE + Valider" : "🖥️ Imprimer + Valider"}</button><button onClick={()=>{ if(items.length) addSale(items, total, false); else flashMsg("Panier vide"); }} style={{marginTop:8, width:"100%", background:T.blue, border:"none", borderRadius:12, padding:12, fontWeight:700, color:T.bg}}>✅ Valider sans ticket</button></div></>);
}

function OwnerContent({ T, shopName, whatsapp, products, setProducts, sales, flashMsg, shopId, stockMovements, updateStock, updateAdminPin, expenses, addExpense }) {
  const [tab, setTab] = useState("dashboard");
  const [showForm, setShowForm] = useState(false);
  const [editProd, setEditProd] = useState(null);
  const [pName, setPName] = useState("");
  const [pPrice, setPPrice] = useState("");
  const [pStock, setPStock] = useState("");
  const [pStockUnlimited, setPStockUnlimited] = useState(false);
  const [showPinForm, setShowPinForm] = useState(false);
  const [newPin, setNewPin] = useState("");
  const [newPinConfirm, setNewPinConfirm] = useState("");
  const [expenseLabel, setExpenseLabel] = useState("");
  const [expenseAmount, setExpenseAmount] = useState("");
  const [expenseCategory, setExpenseCategory] = useState("Frais généraux");
  
  const today = new Date().toISOString().slice(0,10);
  const currentMonth = new Date().toISOString().slice(0,7);
  const currentYear = new Date().toISOString().slice(0,4);
  
  const todaySales = (sales || []).filter(s => s.date === today && !s.cancelled);
  const monthSales = (sales || []).filter(s => s.date?.startsWith(currentMonth) && !s.cancelled);
  const yearSales = (sales || []).filter(s => s.date?.startsWith(currentYear) && !s.cancelled);
  
  const revenueToday = todaySales.reduce((a,b)=>a+(b.total||0),0);
  const revenueMonth = monthSales.reduce((a,b)=>a+(b.total||0),0);
  const revenueYear = yearSales.reduce((a,b)=>a+(b.total||0),0);
  
  const todayExpenses = (expenses || []).filter(e => getDateKey(e.timestamp) === today);
  const monthExpenses = (expenses || []).filter(e => getMonthKey(e.timestamp) === currentMonth);
  const yearExpenses = (expenses || []).filter(e => getYearKey(e.timestamp) === currentYear);
  
  const expensesToday = todayExpenses.reduce((a,b)=>a+(b.amount||0),0);
  const expensesMonth = monthExpenses.reduce((a,b)=>a+(b.amount||0),0);
  const expensesYear = yearExpenses.reduce((a,b)=>a+(b.amount||0),0);
  
  const profitToday = revenueToday - expensesToday;
  const profitMonth = revenueMonth - expensesMonth;
  const profitYear = revenueYear - expensesYear;
  
  const addOrUpdate = () => { if(!pName.trim()) { flashMsg("Nom requis"); return; } const price = parseInt(pPrice); if(!price) { flashMsg("Prix invalide"); return; } const stock = pStockUnlimited ? -1 : (parseInt(pStock) || 0); if(editProd) { const updated = products.map(p=>p.id===editProd.id?{...p, name:pName.trim(), price, stock}:p); setProducts(updated); OfflineStore.set(shopId, "products", updated); if(db) db.collection("shops").doc(shopId).collection("products").doc(editProd.id).update({name:pName.trim(), price, stock}); flashMsg("Produit modifié"); } else { const newProd = { id: Date.now().toString(36)+Math.random().toString(36).slice(2), name:pName.trim(), price, stock, active:true }; setProducts([...products, newProd]); OfflineStore.set(shopId, "products", [...products, newProd]); if(db) db.collection("shops").doc(shopId).collection("products").doc(newProd.id).set(newProd); flashMsg("Produit ajouté"); } setShowForm(false); };
  const deleteProd = (p) => { if(confirm(`Supprimer ${p.name} ?`)) { setProducts(products.filter(pr=>pr.id!==p.id)); OfflineStore.set(shopId, "products", products.filter(pr=>pr.id!==p.id)); if(db) db.collection("shops").doc(shopId).collection("products").doc(p.id).delete(); flashMsg("Produit supprimé"); } };
  const handlePinChange = () => { if(newPin.length !== 4) { flashMsg("Le PIN doit contenir 4 chiffres"); return; } if(newPin !== newPinConfirm) { flashMsg("Les PIN ne correspondent pas"); return; } updateAdminPin(newPin); setShowPinForm(false); setNewPin(""); setNewPinConfirm(""); };
  const handleAddExpense = () => { if(!expenseLabel.trim() || !expenseAmount) { flashMsg("Libellé et montant requis"); return; } addExpense({ label: expenseLabel.trim(), amount: parseInt(expenseAmount), category: expenseCategory }); setExpenseLabel(""); setExpenseAmount(""); setExpenseCategory("Frais généraux"); };
  const lowStock = products.filter(p=>p.stock !== undefined && p.stock !== null && p.stock !== -1 && p.stock <= 5).length;
  
  return (<div style={{flex:1, overflowY:"auto", padding:12}}><div style={{display:"flex", gap:8, marginBottom:16, flexWrap:"wrap"}}><button onClick={()=>setTab("dashboard")} style={{background:tab==="dashboard"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>📊 Tableau de bord</button><button onClick={()=>setTab("expenses")} style={{background:tab==="expenses"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>💰 Dépenses</button><button onClick={()=>setTab("products")} style={{background:tab==="products"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>📦 Produits</button><button onClick={()=>setTab("stock")} style={{background:tab==="stock"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>📊 Stock</button><button onClick={()=>setTab("sales")} style={{background:tab==="sales"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>🧾 Ventes</button><button onClick={()=>setTab("settings")} style={{background:tab==="settings"?T.accent:T.surface, borderRadius:12, padding:"8px 16px"}}>⚙️ Paramètres</button></div>
    
    {tab === "dashboard" && (<div><div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px,1fr))", gap:12, marginBottom:16}}><div style={{background:T.surface, borderRadius:20, padding:16}}><div style={{fontSize:12, color:T.textMute}}>📅 AUJOURD'HUI</div><div style={{marginTop:8}}><div style={{display:"flex", justifyContent:"space-between"}}><span>💰 Chiffre d'affaires</span><span style={{color:T.green}}>{fmtPrice(revenueToday)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:4}}><span>📉 Dépenses</span><span style={{color:T.red}}>{fmtPrice(expensesToday)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:`1px solid ${T.border}`, fontWeight:700}}><span>📈 Bénéfice</span><span style={{color:profitToday>=0?T.green:T.red}}>{fmtPrice(profitToday)}</span></div></div></div><div style={{background:T.surface, borderRadius:20, padding:16}}><div style={{fontSize:12, color:T.textMute}}>📆 MOIS ({currentMonth})</div><div style={{marginTop:8}}><div style={{display:"flex", justifyContent:"space-between"}}><span>💰 Chiffre d'affaires</span><span style={{color:T.green}}>{fmtPrice(revenueMonth)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:4}}><span>📉 Dépenses</span><span style={{color:T.red}}>{fmtPrice(expensesMonth)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:`1px solid ${T.border}`, fontWeight:700}}><span>📈 Bénéfice</span><span style={{color:profitMonth>=0?T.green:T.red}}>{fmtPrice(profitMonth)}</span></div></div></div><div style={{background:T.surface, borderRadius:20, padding:16}}><div style={{fontSize:12, color:T.textMute}}>🗓️ ANNÉE ({currentYear})</div><div style={{marginTop:8}}><div style={{display:"flex", justifyContent:"space-between"}}><span>💰 Chiffre d'affaires</span><span style={{color:T.green}}>{fmtPrice(revenueYear)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:4}}><span>📉 Dépenses</span><span style={{color:T.red}}>{fmtPrice(expensesYear)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:`1px solid ${T.border}`, fontWeight:700}}><span>📈 Bénéfice</span><span style={{color:profitYear>=0?T.green:T.red}}>{fmtPrice(profitYear)}</span></div></div></div></div><div style={{background:T.surface, borderRadius:16, padding:16}}><div style={{fontWeight:700, marginBottom:12}}>📊 Résumé des ventes</div><div style={{display:"flex", justifyContent:"space-between"}}><div><div style={{fontSize:11, color:T.textMute}}>Ventes aujourd'hui</div><div style={{fontSize:24, fontWeight:800}}>{todaySales.filter(s=>!s.cancelled).length}</div></div><div><div style={{fontSize:11, color:T.textMute}}>Stock bas</div><div style={{fontSize:24, fontWeight:800, color:T.orange}}>{lowStock}</div></div><div><div style={{fontSize:11, color:T.textMute}}>Dépenses mois</div><div style={{fontSize:24, fontWeight:800, color:T.red}}>{fmtPrice(expensesMonth)}</div></div></div></div></div>)}
    
    {tab === "expenses" && (<div><div style={{background:T.surface, borderRadius:16, padding:16, marginBottom:16}}><div style={{fontWeight:700, marginBottom:12}}>➕ Ajouter une dépense</div><div style={{display:"flex", flexDirection:"column", gap:8}}><input placeholder="Libellé (ex: Loyer, Électricité, Stock...)" value={expenseLabel} onChange={e=>setExpenseLabel(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:12, color:T.text}} /><input placeholder="Montant (F)" value={expenseAmount} onChange={e=>setExpenseAmount(e.target.value.replace(/\D/g,""))} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:12, color:T.text}} /><select value={expenseCategory} onChange={e=>setExpenseCategory(e.target.value)} style={{background:T.inputBg, border:`1px solid ${T.inputBd}`, borderRadius:12, padding:12, color:T.text}}><option>Frais généraux</option><option>Loyer</option><option>Électricité/Eau</option><option>Salaires</option><option>Achats stock</option><option>Marketing</option><option>Entretien</option><option>Autre</option></select><button onClick={handleAddExpense} style={{background:T.accent, border:"none", borderRadius:12, padding:12, fontWeight:700, color:T.bg}}>💸 Enregistrer la dépense</button></div></div><div><div style={{fontWeight:700, marginBottom:8}}>📋 Historique des dépenses</div>{(expenses || []).sort((a,b)=>b.timestamp - a.timestamp).map(e=>(<div key={e.id} style={{background:T.surface, borderRadius:12, padding:12, marginBottom:8, borderLeft:`4px solid ${T.red}`}}><div style={{display:"flex", justifyContent:"space-between"}}><span style={{fontWeight:600}}>{e.label}</span><span style={{color:T.red}}>{fmtPrice(e.amount)}</span></div><div style={{display:"flex", justifyContent:"space-between", marginTop:4, fontSize:11, color:T.textMute}}><span>{e.category}</span><span>{formatDateTime(e.timestamp)}</span></div></div>))}</div></div>)}
    
    {tab === "products" && (<><button onClick={()=>{setEditProd(null); setPName(""); setPPrice(""); setPStock(""); setPStockUnlimited(false); setShowForm(true);}} style={{background:T.green, border:"none", borderRadius:12, padding:12, marginBottom:12, width:"100%", fontWeight:700, color:T.bg}}>+ Nouveau produit</button>{products.map(p=>(<div key={p.id} style={{background:T.surface, borderRadius:12, padding:12, marginBottom:8, display:"flex", justifyContent:"space-between", alignItems:"center"}}><div><div>{p.name}</div><div style={{fontSize:11, color:T.accent}}>{fmtPrice(p.price)}</div><div style={{fontSize:10}}>{p.stock===undefined||p.stock===null||p.stock===-1 ? "♾️ Illimité" : `Stock: ${p.stock}`}</div></div><div><button onClick={()=>{setEditProd(p); setPName(p.name); setPPrice(String(p.price)); setPStock(p.stock===undefined||p.stock===null||p.stock===-1 ? "" : String(p.stock)); setPStockUnlimited(p.stock===undefined||p.stock===null||p.stock===-1); setShowForm(true);}} style={{background:T.btnBlue.bg, border:"none", borderRadius:8, padding:"4px 10px", marginRight:6}}>✏️</button><button onClick={()=>deleteProd(p)} style={{background:T.btnRed.bg, border:"none", borderRadius:8, padding:"4px 10px"}}>🗑️</button></div></div>))}</>)}
    
    {tab === "stock" && (<div><div style={{marginBottom:16}}><div style={{fontSize:12, fontWeight:600, marginBottom:8}}>📦 Produits</div>{products.filter(p=>p.active!==false).map(p=>(<div key={p.id} style={{background:T.surface, borderRadius:12, padding:12, marginBottom:8}}><div style={{display:"flex", justifyContent:"space-between"}}><span>{p.name}</span><span>{fmtPrice(p.price)}</span></div><div style={{marginTop:6, display:"flex", justifyContent:"space-between", alignItems:"center"}}><span style={{color:p.stock===undefined||p.stock===null||p.stock===-1?T.textMute:(p.stock<=5?T.red:T.green)}}>{p.stock===undefined||p.stock===null||p.stock===-1 ? "♾️ Illimité" : `Stock: ${p.stock}`}</span>{p.stock!==undefined && p.stock!==null && p.stock!==-1 && (<button onClick={()=>{ const qty=prompt("Quantité à ajouter/retirer (positif=ajout, négatif=retrait):"); if(qty){ const num=parseInt(qty); if(num!==0) updateStock(p.id, num, num>0?"entree":"sortie", "Ajustement manuel"); } }} style={{background:T.btnGreen.bg, border:"none", borderRadius:8, padding:"4px 10px", fontSize:10}}>Ajuster</button>)}</div></div>))}</div><div><div style={{fontSize:12, fontWeight:600, marginBottom:8}}>📋 Mouvements récents</div>{stockMovements.slice(0,15).map(m=>(<div key={m.id} style={{background:T.surface2, borderRadius:8, padding:8, marginBottom:6, fontSize:11}}><div style={{display:"flex", justifyContent:"space-between"}}><span>{m.productName}</span><span style={{color:m.type==="entree"?T.green:T.red}}>{m.type==="entree"?`+${m.quantity}`:`-${Math.abs(m.quantity)}`}</span></div><div style={{fontSize:9, color:T.textMute}}>{m.reason} · {new Date(m.timestamp).toLocaleTimeString()}</div></div>))}</div></div>)}
    
    {tab === "sales" && ((sales || []).sort((a,b)=>b.timestamp - a.timestamp).map(s=>(<div key={s.id} style={{background:s.cancelled?T.btnRed.bg:T.surface, borderRadius:12, padding:12, marginBottom:8, borderLeft:`4px solid ${s.cancelled?T.red:T.green}`}}><div style={{display:"flex", justifyContent:"space-between"}}><span>{new Date(s.timestamp).toLocaleTimeString()}</span><span>{fmtPrice(s.total)}</span></div>{(s.items || []).slice(0,2).map((it,i)=><div key={i} style={{fontSize:11}}>• {it.label} x{it.qty}</div>)}{s.cancelled && <div style={{fontSize:10, color:T.red, marginTop:4}}>❌ ANNULÉ : {s.cancelRaison}</div>}</div>)))}
    
    {tab === "settings" && (<div style={{background:T.surface, borderRadius:16, padding:16}}><div style={{fontSize:16, fontWeight:700, marginBottom:12}}>⚙️ Paramètres de sécurité</div><button onClick={()=>setShowPinForm(true)} style={{background:T.btnBlue.bg, border:"none", borderRadius:12, padding:12, width:"100%", fontWeight:600, color:T.blue}}>🔐 Changer le PIN administrateur</button><div style={{marginTop:16, padding:12, background:T.surface2, borderRadius:12}}><div style={{fontSize:12, color:T.textMute}}>WhatsApp de contact</div><div style={{fontWeight:600}}>{whatsapp}</div><button onClick={()=>window.open(`https://wa.me/${whatsapp?.replace(/\D/g,"")}?text=${encodeURIComponent(`Rapport ${shopName}`)}`, "_blank")} style={{marginTop:8, background:T.accent, border:"none", borderRadius:8, padding:"6px", fontSize:11}}>📱 Envoyer rapport</button></div></div>)}
    
    {showForm && (<div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000}}><div style={{background:T.surface, borderRadius:24, padding:20, width:"90%", maxWidth:360}}><div style={{fontSize:18, fontWeight:800}}>{editProd?"Modifier":"Nouveau produit"}</div><input placeholder="Nom" value={pName} onChange={e=>setPName(e.target.value)} style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, margin:"12px 0", color:T.text}} /><input placeholder="Prix (F)" value={pPrice} onChange={e=>setPPrice(e.target.value.replace(/\D/g,""))} style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, marginBottom:12, color:T.text}} /><label style={{display:"flex", alignItems:"center", gap:6, marginBottom:12}}><input type="checkbox" checked={pStockUnlimited} onChange={e=>setPStockUnlimited(e.target.checked)} /><span>♾️ Stock illimité</span></label>{!pStockUnlimited && <input placeholder="Stock initial" value={pStock} onChange={e=>setPStock(e.target.value.replace(/\D/g,""))} style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, marginBottom:12, color:T.text}} />}<div style={{display:"flex", gap:8}}><button onClick={()=>setShowForm(false)} style={{flex:1, background:T.surface2, borderRadius:12, padding:12}}>Annuler</button><button onClick={addOrUpdate} style={{flex:1, background:T.accent, borderRadius:12, padding:12, color:T.bg}}>Enregistrer</button></div></div></div>)}
    {showPinForm && (<div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000}}><div style={{background:T.surface, borderRadius:24, padding:20, width:"90%", maxWidth:360}}><div style={{fontSize:18, fontWeight:800}}>🔐 Changer le PIN Admin</div><input type="password" placeholder="Nouveau PIN (4 chiffres)" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,"").slice(0,4))} style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, margin:"12px 0", color:T.text}} /><input type="password" placeholder="Confirmer le PIN" value={newPinConfirm} onChange={e=>setNewPinConfirm(e.target.value.replace(/\D/g,"").slice(0,4))} style={{width:"100%", background:T.inputBg, borderRadius:12, padding:12, marginBottom:12, color:T.text}} /><div style={{display:"flex", gap:8}}><button onClick={()=>{setShowPinForm(false); setNewPin(""); setNewPinConfirm("");}} style={{flex:1, background:T.surface2, borderRadius:12, padding:12}}>Annuler</button><button onClick={handlePinChange} style={{flex:1, background:T.accent, borderRadius:12, padding:12, color:T.bg}}>Modifier</button></div></div></div>)}
  </div>);
}

function DevDashboard({ T, themeName, setThemeName, logout, flashMsg }) {
  const [shops, setShops] = useState([]); const [loading, setLoading] = useState(true); const [editingPlan, setEditingPlan] = useState(null);
  useEffect(() => { if(!db) return; const unsub = db.collection("shops").onSnapshot(snap => { setShops(snap.docs.map(d=>({id:d.id, ...d.data()}))); setLoading(false); }); return unsub; }, []);
  const updateSubscription = async (shopId, newPlan) => { const shop = shops.find(s => s.id === shopId); if(!shop) return; const now = Date.now(); const newEnd = calculateEndDate(now, newPlan); await db.collection("shops").doc(shopId).update({ plan: newPlan, subscriptionStart: now, subscriptionEnd: newEnd }); flashMsg(`Abonnement ${shop.shopName} mis à jour : ${newPlan}`); setEditingPlan(null); };
  const sendReminder = async (shop) => { const daysLeft = shop.subscriptionEnd ? getDaysLeft(shop.subscriptionEnd) : 0; const message = `🔔 RAPPEL D'ABONNEMENT - ${shop.shopName}\n\nVotre abonnement ${shop.plan || "mensuel"} expire le ${formatDate(shop.subscriptionEnd)}\nPlus que ${daysLeft} jours !\n\nContactez-nous pour renouveler : ${DEV_WHATSAPP}`; window.open(`https://wa.me/${shop.whatsapp?.replace(/\D/g,"")}?text=${encodeURIComponent(message)}`, "_blank"); flashMsg(`Rappel envoyé à ${shop.shopName}`); };
  const toggleShop = async (shop) => { await db.collection("shops").doc(shop.id).update({active:!shop.active}); flashMsg(shop.active?"Commerce suspendu":"Commerce activé"); };
  const getPlanColor = (plan) => { if(plan === "mensuel") return T.blue; if(plan === "trimestriel") return T.orange; if(plan === "annuel") return T.green; return T.textMute; };
  const getStatusColor = (shop) => { if(!shop.active) return T.red; if(!shop.subscriptionEnd) return T.orange; const daysLeft = getDaysLeft(shop.subscriptionEnd); if(daysLeft <= 0) return T.red; if(daysLeft <= 7) return T.orange; return T.green; };
  return (<div style={{height:"100dvh", background:T.bg, display:"flex", flexDirection:"column"}}><div style={{background:T.header, padding:"8px 12px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between"}}><div><div style={{fontSize:9, color:T.textMute}}>Développeur</div><div style={{fontFamily:"'Outfit'", fontWeight:800, color:T.purple}}>Gestion des abonnements + BLE Print</div></div><div style={{display:"flex", gap:8}}><div style={{display:"flex", gap:4}}>{Object.values(THEMES).map(t=><button key={t.id} onClick={()=>setThemeName(t.id)} style={{background:themeName===t.id?T.accent:"transparent", border:"none", borderRadius:16, width:28, height:28}}>{t.label}</button>)}</div><button onClick={logout} style={{background:"transparent", border:`1px solid ${T.border}`, borderRadius:8, padding:"4px 8px"}}>Déco</button></div></div><div style={{flex:1, overflowY:"auto", padding:12}}><div style={{background:T.surface, borderRadius:16, padding:16, marginBottom:16}}><div style={{fontWeight:700}}>🏪 Multi-commerce SaaS</div><div style={{fontSize:11, color:T.textMute}}>{shops.length} commerces · Gestion des abonnements (mensuel/trimestriel/annuel) · Bande défilante pour alertes</div></div>{loading ? <div className="spin" style={{width:30,height:30,border:`2px solid ${T.border}`,borderTopColor:T.accent,borderRadius:"50%",margin:"20px auto"}}></div> : shops.map(shop => { const daysLeft = shop.subscriptionEnd ? getDaysLeft(shop.subscriptionEnd) : 0; const statusColor = getStatusColor(shop); return (<div key={shop.id} style={{background:T.surface, borderRadius:16, padding:16, marginBottom:12, borderLeft: `4px solid ${statusColor}`}}><div style={{display:"flex", justifyContent:"space-between", alignItems:"start", flexWrap:"wrap", gap:8}}><div><div style={{fontWeight:800, fontSize:16}}>{shop.shopName}</div><div style={{fontSize:11, color:T.textMute}}>Propriétaire: {shop.ownerName} · WhatsApp: {shop.whatsapp}</div><div style={{fontSize:11, color:T.textMute}}>Créé le: {formatDate(shop.createdAt)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:12, color:T.textMute}}>Statut</div><div style={{fontWeight:700, color:statusColor}}>{shop.active ? (daysLeft <= 0 ? "⚠️ Expiré" : (daysLeft <= 7 ? "⚠️ Bientôt expiré" : "✅ Actif")) : "🔒 Suspendu"}</div></div></div><div style={{marginTop:12, paddingTop:12, borderTop:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10}}><div><div style={{fontSize:11, color:T.textMute}}>Abonnement actuel</div><div style={{display:"flex", alignItems:"center", gap:6}}><span style={{background:getPlanColor(shop.plan), padding:"2px 10px", borderRadius:20, fontSize:12, fontWeight:600, color:"#fff"}}>{shop.plan || "mensuel"}</span>{shop.subscriptionEnd && <span style={{fontSize:11, color:T.textMute}}>Expire: {formatDate(shop.subscriptionEnd)} ({daysLeft} jours)</span>}</div></div><div style={{display:"flex", gap:6, flexWrap:"wrap"}}><select value={editingPlan === shop.id ? editingPlan : ""} onChange={e => { if(e.target.value) updateSubscription(shop.id, e.target.value); else setEditingPlan(null); }} style={{background:T.inputBg, border:`1px solid ${T.border}`, borderRadius:8, padding:"6px 10px", fontSize:11, color:T.text}}><option value="">Changer plan</option><option value="mensuel">📅 Mensuel (30j)</option><option value="trimestriel">📆 Trimestriel (90j)</option><option value="annuel">🗓️ Annuel (365j)</option></select><button onClick={()=>sendReminder(shop)} style={{background:T.btnBlue.bg, border:"none", borderRadius:8, padding:"6px 12px", fontSize:11, color:T.blue}}>📱 Rappel</button><button onClick={()=>toggleShop(shop)} style={{background:shop.active?T.btnRed.bg:T.btnGreen.bg, border:"none", borderRadius:8, padding:"6px 12px", fontSize:11, color:shop.active?T.red:T.green}}>{shop.active?"🔒 Suspendre":"✅ Activer"}</button></div></div></div>); })}</div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
