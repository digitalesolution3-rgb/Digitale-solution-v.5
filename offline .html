<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - Caisse Pro</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0A0E12;
            color: #E8E4DA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            color: #A8A49A;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        button {
            background: #F5C842;
            color: #0A0E12;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Les données en cache sont disponibles.<br>Reconnectez-vous pour synchroniser les nouvelles ventes et dépenses.</p>
        <button onclick="location.reload()">🔄 Réessayer</button>
    </div>
</body>
</html>
